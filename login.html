# Tela de Login VIP Premium — Lux Papelaria

Crie um novo arquivo chamado:

```txt
login.html
```

Cole ESTE código completo:

```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lux Papelaria | Área VIP</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop') center/cover;
      overflow: hidden;
    }

    .glass {
      width: 420px;
      padding: 40px;
      border-radius: 30px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(255, 208, 0, 0.15);
      animation: fade 1s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo h1 {
      color: #ffd000;
      font-size: 42px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .logo p {
      color: #ddd;
      font-size: 15px;
    }

    .input-box {
      margin-bottom: 20px;
    }

    .input-box input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .input-box input:focus {
      border: 1px solid #ffd000;
      box-shadow: 0 0 12px rgba(255,208,0,0.4);
    }

    .input-box input::placeholder {
      color: #bbb;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg,#ffd000,#ffb700);
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }

    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px rgba(255,208,0,0.5);
    }

    .bottom {
      text-align: center;
      margin-top: 20px;
      color: #ddd;
      font-size: 14px;
    }

    .bottom span {
      color: #ffd000;
      cursor: pointer;
      font-weight: bold;
    }

    #status {
      text-align: center;
      margin-top: 20px;
      color: #ffd000;
      font-size: 14px;
    }

  </style>
</head>
<body>

  <div class="glass">

    <div class="logo">
      <h1>Lux Papelaria</h1>
      <p>Área VIP Premium</p>
    </div>

    <div class="input-box">
      <input type="email" id="email" placeholder="Digite seu email">
    </div>

    <div class="input-box">
      <input type="password" id="senha" placeholder="Digite sua senha">
    </div>

    <button class="btn" onclick="login()">
      Entrar na Área VIP
    </button>

    <div class="bottom">
      Não possui conta?
      <span onclick="cadastro()">Criar conta</span>
    </div>

    <p id="status"></p>

  </div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBt3IoovnnYkdBNzTwXgaqVPaAgvOYbKf8",
  authDomain: "lux-papelaria.firebaseapp.com",
  projectId: "lux-papelaria",
  storageBucket: "lux-papelaria.firebasestorage.app",
  messagingSenderId: "651144008791",
  appId: "1:651144008791:web:16b818c1e870391ac53f12","
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const status = document.getElementById('status');

  try {

    await signInWithEmailAndPassword(auth, email, senha);

    status.innerHTML = 'Login realizado com sucesso!';

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);

  } catch (error) {

    status.innerHTML = 'Email ou senha inválidos';

  }
}

window.cadastro = async function () {

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  const status = document.getElementById('status');

  try {

    await createUserWithEmailAndPassword(auth, email, senha);

    status.innerHTML = 'Conta criada com sucesso!';

  } catch (error) {

    status.innerHTML = 'Erro ao criar conta';

  }
}

</script>

</body>
</html>
```
